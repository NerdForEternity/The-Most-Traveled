<meta name="DESCRIPTION" content="The website www.themosttraveled.com contains detailed descriptions of the book The Most Traveled Man on Earth, a non-fiction book by Llewellyn Lew Toulmin, as well as his subsequent adventures after writing the book.  Toulmin is not the most traveled man, but he writes about the two men competing for this title, as well as his travel adventures trying to catch up with them.  Lew is listed as one of the 100 most traveled people on earth, having been to over 175 countries and sovereign territories.   Lews adventures and travels include sailing on tall ships and cruise ships in every ocean, re-discovering the real Bali Hai of South Pacific fame, searching for fellow adventurer Steve Fossett, helping to find a missing light aircraft in Arizona and co-founding the Missing Aircraft Search Team, cruising all of Route 66 in a 1968 Bullitt Mustang, finding the lost ghost town of his great-ggg-grandfather, one of the founders of Alabama, and interviewing fascinating people from all walks of life including various cruise ship staff; a Papal Swiss Guard; and a former ballerina and spy who is also the First Lady of the new country of East Timor."/>
